<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CF Gallery</title>
<style>
:root{
  --bg:#0d0020;
  --bg2:#160035;
  --sf:#1e0045;
  --sf2:#2a0060;
  --ac:#a855f7;
  --ac2:#7c3aed;
  --ac3:#c084fc;
  --glow:rgba(168,85,247,.4);
  --tx:#f0e6ff;
  --tx2:#c4a8e8;
  --bd:#3d1a6e;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI','Microsoft JhengHei',sans-serif;min-height:100vh;}

/* Header */
header{
  background:linear-gradient(135deg,#1a0040,#2d006a);
  border-bottom:2px solid var(--ac);
  padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 20px rgba(168,85,247,.3);
}
header h1{font-size:1.5rem;color:var(--ac3);letter-spacing:3px;text-shadow:0 0 20px var(--glow);}
header .upd{font-size:.75rem;color:var(--tx2);}

/* Date tabs */
.dtbar{
  background:var(--bg2);
  padding:10px 28px 0;
  border-bottom:1px solid var(--bd);
  display:flex;gap:4px;flex-wrap:wrap;
}
.dt{
  background:transparent;color:var(--tx2);border:none;
  border-bottom:3px solid transparent;
  padding:8px 20px;cursor:pointer;font-size:.9rem;
  border-radius:var(--r) var(--r) 0 0;transition:all .2s;white-space:nowrap;
}
.dt:hover{background:var(--sf);color:var(--tx);}
.dt.on{color:var(--ac3);border-bottom-color:var(--ac);font-weight:bold;}

/* Activity tabs */
.ats{display:flex;gap:8px;flex-wrap:wrap;padding:18px 28px 0;justify-content:center;}
.at{
  background:var(--sf);color:var(--tx2);
  border:1px solid var(--bd);
  padding:6px 18px;border-radius:20px;
  cursor:pointer;font-size:.9rem;transition:all .2s;
  display:flex;align-items:center;gap:8px;
}
.at:hover{background:var(--sf2);color:var(--tx);border-color:var(--ac2);}
.at.on{
  background:linear-gradient(135deg,var(--ac2),var(--ac));
  color:#fff;border-color:var(--ac);font-weight:bold;
  box-shadow:0 0 14px var(--glow);
}
.cnt{
  background:rgba(255,255,255,.2);
  border-radius:10px;padding:1px 8px;font-size:.78rem;
}

/* Date panel */
.dp{display:none;}
.dp.on{display:block;}

/* Viewer */
.viewer{
  display:flex;align-items:center;justify-content:center;
  padding:20px 28px;gap:16px;
  min-height:60vh;
}
.arrow{
  background:linear-gradient(135deg,var(--sf2),var(--sf));
  border:2px solid var(--bd);color:var(--ac3);
  width:52px;height:52px;border-radius:50%;
  font-size:1.4rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.arrow:hover{
  background:linear-gradient(135deg,var(--ac2),var(--ac));
  border-color:var(--ac);
  box-shadow:0 0 20px var(--glow);
  transform:scale(1.1);
}
.arrow.hidden{opacity:0;pointer-events:none;}
.main-img-wrap{
  flex:1;max-width:860px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
.main-img-wrap img{
  width:100%;max-height:62vh;
  object-fit:contain;
  border-radius:var(--r);
  border:2px solid var(--bd);
  box-shadow:0 4px 40px rgba(168,85,247,.25);
  background:var(--sf);
}
.counter{
  font-size:.88rem;color:var(--tx2);
  background:var(--sf);border:1px solid var(--bd);
  padding:4px 16px;border-radius:20px;
}

/* Thumbnail strip */
.thumbs{
  display:flex;gap:8px;padding:0 28px 24px;justify-content:center;
  overflow-x:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--bd) transparent;
}
.thumbs::-webkit-scrollbar{height:4px;}
.thumbs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.thumb{
  width:100px;height:56px;flex-shrink:0;
  border-radius:6px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;
  transition:all .2s;opacity:.6;
}
.thumb:hover{opacity:1;border-color:var(--ac2);}
.thumb.on{opacity:1;border-color:var(--ac);box-shadow:0 0 10px var(--glow);}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
</style>
</head>
<body>

<header>
  <h1>CF Gallery</h1>
  <span class="upd">最後更新：2026-05-27 00:05:04</span>
</header>

<div class="dtbar"><button class="dt on" onclick="switchDate('20260526')" id="dt-20260526">2026/05/26</button></div>

<div id="panels"><div class="dp on" id="dp-20260526"><div class="ats" id="ats-20260526"><button class="at on" onclick="switchAct('20260526','tab1')" id="at-20260526-tab1">促銷<span class="cnt">10</span></button><button class="at " onclick="switchAct('20260526','tab2')" id="at-20260526-tab2">活動<span class="cnt">8</span></button><button class="at " onclick="switchAct('20260526','tab3')" id="at-20260526-tab3">公告<span class="cnt">6</span></button></div></div></div>

<div class="viewer">
  <button class="arrow" id="btnPrev" onclick="navigate(-1)">&#8249;</button>
  <div class="main-img-wrap">
    <img id="mainImg" src="" alt=""/>
    <div class="counter" id="counter">1 / 1</div>
  </div>
  <button class="arrow" id="btnNext" onclick="navigate(1)">&#8250;</button>
</div>

<div class="thumbs" id="thumbs"></div>

<script>
const IMGS = {"20260526": {"tab1": ["20260526/tab1_1.png", "20260526/tab1_2.png", "20260526/tab1_3.png", "20260526/tab1_4.png", "20260526/tab1_5.png", "20260526/tab1_6.png", "20260526/tab1_7.png", "20260526/tab1_8.png", "20260526/tab1_9.png", "20260526/tab1_10.png"], "tab2": ["20260526/tab2_1.png", "20260526/tab2_2.png", "20260526/tab2_3.png", "20260526/tab2_4.png", "20260526/tab2_5.png", "20260526/tab2_6.png", "20260526/tab2_7.png", "20260526/tab2_8.png"], "tab3": ["20260526/tab3_1.png", "20260526/tab3_2.png", "20260526/tab3_3.png", "20260526/tab3_4.png", "20260526/tab3_5.png", "20260526/tab3_6.png"]}};
let curDate = '20260526';
let curTab = '';
let curIdx = 0;

function switchDate(d) {
  document.querySelectorAll('.dt').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.dp').forEach(p=>p.classList.remove('on'));
  document.getElementById('dt-'+d).classList.add('on');
  document.getElementById('dp-'+d).classList.add('on');
  curDate = d;
  // activate first tab of this date
  const firstTab = Object.keys(IMGS[d])[0];
  switchAct(d, firstTab);
}

function switchAct(d, k) {
  document.querySelectorAll('.at').forEach(b=>b.classList.remove('on'));
  const btn = document.getElementById('at-'+d+'-'+k);
  if(btn) btn.classList.add('on');
  curTab = k;
  curIdx = 0;
  renderViewer();
}

function renderViewer() {
  const imgs = IMGS[curDate][curTab] || [];
  const total = imgs.length;
  if(!total) return;

  // Main image
  document.getElementById('mainImg').src = imgs[curIdx];
  document.getElementById('counter').textContent = (curIdx+1) + ' / ' + total;

  // Arrows
  document.getElementById('btnPrev').classList.toggle('hidden', curIdx === 0);
  document.getElementById('btnNext').classList.toggle('hidden', curIdx === total-1);

  // Thumbnails
  const strip = document.getElementById('thumbs');
  strip.innerHTML = imgs.map((src, i) =>
    `<div class="thumb ${i===curIdx?'on':''}" onclick="goTo(${i})">
      <img src="${src}" loading="lazy"/>
    </div>`
  ).join('');

  // Scroll active thumb into view
  setTimeout(()=>{
    const active = strip.querySelector('.thumb.on');
    if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, 50);
}

function navigate(dir) {
  const imgs = IMGS[curDate][curTab] || [];
  curIdx = Math.max(0, Math.min(imgs.length-1, curIdx+dir));
  renderViewer();
}

function goTo(i) {
  curIdx = i;
  renderViewer();
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft') navigate(-1);
  if(e.key==='ArrowRight') navigate(1);
});

// Init
const firstDate = '20260526';
const firstTab = Object.keys(IMGS[firstDate])[0];
curTab = firstTab;
renderViewer();
</script>
</body>
</html>
