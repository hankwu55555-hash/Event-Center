<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CF Gallery</title>
<style>
:root{
  --bg:#0d0020;
  --bg2:#160035;
  --sf:#1e0045;
  --sf2:#2a0060;
  --ac:#a855f7;
  --ac2:#7c3aed;
  --ac3:#c084fc;
  --glow:rgba(168,85,247,.4);
  --tx:#f0e6ff;
  --tx2:#c4a8e8;
  --bd:#3d1a6e;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI','Microsoft JhengHei',sans-serif;min-height:100vh;}

/* Header */
header{
  background:linear-gradient(135deg,#1a0040,#2d006a);
  border-bottom:2px solid var(--ac);
  padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 20px rgba(168,85,247,.3);
}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo img{width:44px;height:44px;border-radius:10px;box-shadow:0 0 12px rgba(168,85,247,.5);}
.logo span{font-size:1.4rem;font-weight:bold;color:#fde047;letter-spacing:2px;text-shadow:0 0 16px rgba(253,224,71,.6);}
header .upd{font-size:.75rem;color:var(--tx2);}

/* Calendar picker */
.header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.cal-wrap{position:relative;}
/* Country selector */
.country-sel{display:flex;align-items:center;}
.csel-wrap{position:relative;}
.csel-popup{
  display:none;position:absolute;left:0;top:calc(100% + 10px);
  background:var(--sf2);border:2px solid var(--ac);
  border-radius:var(--r);padding:8px;min-width:140px;
  box-shadow:0 8px 40px rgba(168,85,247,.5);z-index:999;
}
.csel-popup.open{display:block;}
.csel-opt{
  padding:9px 16px;border-radius:8px;cursor:pointer;
  color:var(--tx);font-size:.9rem;font-weight:600;
  transition:all .15s;white-space:nowrap;
}
.csel-opt:hover{background:var(--ac2);color:#fff;}
.csel-opt.on{
  background:linear-gradient(135deg,#f59e0b,#fde047);
  color:#1a0a00;
}
/* Rank badges */
.header-center{
  display:flex;align-items:center;gap:10px;
  flex:1;justify-content:center;flex-wrap:wrap;
}
.rank-label{font-size:.8rem;color:var(--tx2);white-space:nowrap;letter-spacing:1px;}
.rank-badge{
  display:flex;align-items:center;gap:7px;
  background:var(--sf);border:1px solid var(--bd);
  border-radius:20px;padding:0 15px;
  height:40px;box-sizing:border-box;
  transition:all .25s;
}
.rank-badge .s-icon{width:20px;height:20px;flex-shrink:0;}
.rank-badge .s-name{font-size:.72rem;color:var(--tx2);}
.rank-badge .r-num{
  font-size:1.1rem;font-weight:bold;color:var(--tx2);
  min-width:28px;text-align:right;letter-spacing:0;
}
.rank-badge.live .r-num{color:#fde047;text-shadow:0 0 8px rgba(253,224,71,.6);}
.cal-btn{
  background:linear-gradient(135deg,#f59e0b,#fde047);
  color:#1a0a00;border:none;
  padding:0 20px;border-radius:20px;
  cursor:pointer;font-size:.9rem;font-weight:bold;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 0 14px rgba(245,158,11,.5);
  transition:all .2s;white-space:nowrap;
  height:40px;box-sizing:border-box;
}
.cal-btn:hover{box-shadow:0 0 22px rgba(245,158,11,.8);transform:scale(1.04);}
.cal-popup{
  display:none;position:absolute;right:0;top:calc(100% + 10px);
  background:var(--sf2);border:2px solid var(--ac);
  border-radius:var(--r);padding:18px;min-width:290px;
  box-shadow:0 8px 40px rgba(168,85,247,.5);z-index:999;
}
.cal-popup.open{display:block;}
.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.cal-nav button{
  background:var(--sf);border:1px solid var(--bd);color:var(--tx);
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  font-size:1.2rem;line-height:1;transition:all .2s;
}
.cal-nav button:hover{background:var(--ac2);border-color:var(--ac);color:#fff;}
.cal-nav span{font-weight:bold;color:var(--ac3);font-size:1rem;}
.cal-dow{
  display:grid;grid-template-columns:repeat(7,1fr);
  text-align:center;margin-bottom:6px;
}
.cal-dow span{font-size:.72rem;color:var(--tx2);padding:2px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:8px;font-size:.85rem;cursor:default;
  color:rgba(255,255,255,.2);transition:all .2s;
}
.cal-cell.has-data{
  background:rgba(168,85,247,.25);color:var(--tx);cursor:pointer;
  border:1px solid var(--bd);font-weight:600;
}
.cal-cell.has-data:hover{background:var(--ac2);border-color:var(--ac);color:#fff;box-shadow:0 0 8px var(--glow);}
.cal-cell.selected{
  background:linear-gradient(135deg,#f59e0b,#fde047)!important;
  color:#1a0a00!important;border-color:#fde047!important;font-weight:bold;
  box-shadow:0 0 12px rgba(245,158,11,.6);
}

/* Activity tabs */
.ats{display:flex;gap:8px;flex-wrap:wrap;padding:18px 28px 0;justify-content:center;}
.at{
  background:var(--sf);color:var(--tx2);
  border:1px solid var(--bd);
  padding:6px 18px;border-radius:20px;
  cursor:pointer;font-size:.9rem;transition:all .2s;
  display:flex;align-items:center;gap:8px;
}
.at:hover{background:#78350f;color:#fff;border-color:#fde047;}
.at.on{
  background:linear-gradient(135deg,#f59e0b,#fde047);
  color:#1a0a00;border-color:#fde047;font-weight:bold;
  box-shadow:0 0 14px rgba(245,158,11,.5);
}
.cnt{
  background:rgba(255,255,255,.2);
  border-radius:10px;padding:1px 8px;font-size:.78rem;
}

/* Date panel */
.dp{display:none;}
.dp.on{display:block;}

/* Viewer */
.viewer{
  display:flex;align-items:center;justify-content:center;
  padding:20px 28px;gap:16px;
  min-height:60vh;
}
.arrow{
  background:linear-gradient(135deg,#92400e,#78350f);
  border:2px solid #fde047;color:#fff176;
  width:52px;height:52px;border-radius:50%;
  font-size:1.4rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.arrow:hover{
  background:linear-gradient(135deg,#f59e0b,#fde047);
  border-color:#fde047;
  box-shadow:0 0 20px rgba(245,158,11,.5);
  transform:scale(1.1);
}
.arrow.hidden{opacity:0;pointer-events:none;}
.main-img-wrap{
  flex:1;max-width:860px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
.main-img-wrap img{
  width:100%;max-height:62vh;
  object-fit:contain;
  border-radius:var(--r);
  border:2px solid var(--bd);
  box-shadow:0 4px 40px rgba(168,85,247,.25);
  background:var(--sf);
}
.counter{
  font-size:.88rem;color:#1a0a00;font-weight:bold;
  background:linear-gradient(135deg,#f59e0b,#fde047);border:1px solid #fde047;
  padding:4px 16px;border-radius:20px;
  box-shadow:0 0 10px rgba(245,158,11,.4);
}

/* Thumbnail strip */
.thumbs{
  display:flex;gap:8px;padding:0 28px 24px;justify-content:center;
  overflow-x:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--bd) transparent;
}
.thumbs::-webkit-scrollbar{height:4px;}
.thumbs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
/* Loading overlay */
.loading-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(13,0,32,.82);z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
.loading-overlay.show{display:flex;}
.spinner{
  width:56px;height:56px;
  border:4px solid rgba(168,85,247,.2);
  border-top:4px solid #a855f7;
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:#c084fc;font-size:.95rem;letter-spacing:3px;font-weight:600;}
.thumb{
  width:100px;height:56px;flex-shrink:0;
  border-radius:6px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;
  transition:all .2s;opacity:.6;
}
.thumb:hover{opacity:1;border-color:var(--ac2);}
.thumb.on{opacity:1;border-color:var(--ac);box-shadow:0 0 10px var(--glow);}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="basic/icon.png" alt="Cash Frenzy"/>
    <span>Cash Frenzy</span>
  </div>
  <div class="header-center">
    <span class="rank-label">類別排名</span>
    <div class="rank-badge" id="rankApple">
      <svg class="s-icon" viewBox="0 0 24 24" width="30" height="30" fill="#a0c4ff"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      <span class="s-name">App Store</span>
      <span class="r-num" id="rApple">--</span>
    </div>
    <div class="rank-badge" id="rankAndroid">
      <svg class="s-icon" viewBox="0 0 24 24" width="16" height="16"><path fill="#4285F4" d="M3.18 1.06a1.5 1.5 0 00-.88 1.44v19c0 .65.37 1.2.88 1.44L13.6 12z"/><path fill="#FBBC05" d="M20.82 10.7l-3.1-1.78-3.32 3.08 3.32 3.08 3.1-1.78a1.5 1.5 0 000-2.6z"/><path fill="#EA4335" d="M3.18 1.06L13.6 12l4.12-3.08L5.08.4a1.5 1.5 0 00-1.9.66z"/><path fill="#34A853" d="M3.18 22.94L13.6 12l4.12 3.08L5.08 23.6a1.5 1.5 0 01-1.9-.66z"/></svg>
      <span class="s-name">Google Play</span>
      <span class="r-num" id="rAndroid">--</span>
    </div>
  </div>
  <div class="header-right">
    <div class="country-sel">
      <div class="csel-wrap" id="cselWrap">
        <button class="cal-btn" id="cselBtn" onclick="toggleCsel()">
          <span id="cselBtnTxt">台灣</span>
          &#9660;
        </button>
        <div class="csel-popup" id="cselPopup">
          <div class="csel-opt on" data-c="TW" onclick="selectCountry('TW')">台灣</div>
          <div class="csel-opt" data-c="US" onclick="selectCountry('US')">美國</div>
          <div class="csel-opt" data-c="JP" onclick="selectCountry('JP')">日本</div>
          <div class="csel-opt" data-c="UK" onclick="selectCountry('UK')">英國</div>
        </div>
      </div>
    </div>
    <div class="cal-wrap" id="calWrap">
      <button class="cal-btn" id="calBtn" onclick="toggleCal()">
        <span id="calBtnTxt">選擇日期</span>
        &#9660;
      </button>
      <div class="cal-popup" id="calPopup">
        <div class="cal-nav">
          <button onclick="changeMonth(-1)">&#8249;</button>
          <span id="calMonthLabel"></span>
          <button onclick="changeMonth(1)">&#8250;</button>
        </div>
        <div class="cal-dow">
          <span>日</span><span>一</span><span>二</span><span>三</span>
          <span>四</span><span>五</span><span>六</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>
  </div>
</header>

<div id="panels"><div class="dp on" id="dp-20260527"><div class="ats" id="ats-20260527"><button class="at on" onclick="switchAct('20260527','tab1')" id="at-20260527-tab1">促銷</button><button class="at " onclick="switchAct('20260527','tab2')" id="at-20260527-tab2">活動</button><button class="at " onclick="switchAct('20260527','tab3')" id="at-20260527-tab3">公告</button></div></div><div class="dp " id="dp-20260526"><div class="ats" id="ats-20260526"><button class="at on" onclick="switchAct('20260526','tab1')" id="at-20260526-tab1">促銷</button><button class="at " onclick="switchAct('20260526','tab2')" id="at-20260526-tab2">活動</button><button class="at " onclick="switchAct('20260526','tab3')" id="at-20260526-tab3">公告</button></div></div></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span class="loading-text">資源下載中</span>
</div>

<div class="viewer">
  <button class="arrow" id="btnPrev" onclick="navigate(-1)">&#8249;</button>
  <div class="main-img-wrap">
    <img id="mainImg" src="" alt=""/>
    <div class="counter" id="counter">1 / 1</div>
  </div>
  <button class="arrow" id="btnNext" onclick="navigate(1)">&#8250;</button>
</div>

<div class="thumbs" id="thumbs"></div>

<script>
const IMGS = {"20260527": {"tab1": ["20260527/tab1_1.png", "20260527/tab1_2.png", "20260527/tab1_3.png", "20260527/tab1_4.png", "20260527/tab1_5.png", "20260527/tab1_6.png", "20260527/tab1_7.png", "20260527/tab1_8.png", "20260527/tab1_9.png", "20260527/tab1_10.png"], "tab2": ["20260527/tab2_1.png", "20260527/tab2_2.png", "20260527/tab2_3.png", "20260527/tab2_4.png", "20260527/tab2_5.png", "20260527/tab2_6.png", "20260527/tab2_7.png", "20260527/tab2_8.png"], "tab3": ["20260527/tab3_1.png", "20260527/tab3_2.png", "20260527/tab3_3.png", "20260527/tab3_4.png", "20260527/tab3_5.png"]}, "20260526": {"tab1": ["20260526/tab1_1.png", "20260526/tab1_2.png", "20260526/tab1_3.png", "20260526/tab1_4.png", "20260526/tab1_5.png", "20260526/tab1_6.png", "20260526/tab1_7.png", "20260526/tab1_8.png", "20260526/tab1_9.png", "20260526/tab1_10.png"], "tab2": ["20260526/tab2_1.png", "20260526/tab2_2.png", "20260526/tab2_3.png", "20260526/tab2_4.png", "20260526/tab2_5.png", "20260526/tab2_6.png", "20260526/tab2_7.png", "20260526/tab2_8.png"], "tab3": ["20260526/tab3_1.png", "20260526/tab3_2.png", "20260526/tab3_3.png", "20260526/tab3_4.png", "20260526/tab3_5.png"]}};
const AVAIL_DATES = ["20260527", "20260526"];
const RANKINGS = {"20260526": {"TW": {"apple": 1, "android": 2}, "US": {"apple": 5, "android": 3}, "JP": {"apple": 8, "android": 6}, "UK": {"apple": 12, "android": 9}}, "20260527": {"TW": {"apple": 1, "android": 2}, "US": {"apple": 4, "android": 3}, "JP": {"apple": 7, "android": 5}, "UK": {"apple": 11, "android": 8}}, "20260528": {"TW": {"apple": 75, "android": 22}, "US": {"apple": 66, "android": 8}, "JP": {"apple": 93, "android": 37}, "UK": {"apple": 48, "android": 22}}};
let curCountry = 'TW';

function toggleCsel() {
  document.getElementById('cselPopup').classList.toggle('open');
}

function selectCountry(c) {
  curCountry = c;
  const labels = {'TW':'台灣','US':'美國','JP':'日本','UK':'英國'};
  const btn = document.getElementById('cselBtnTxt');
  if(btn) btn.textContent = labels[c] || c;
  document.querySelectorAll('.csel-opt').forEach(o=>o.classList.remove('on'));
  const opt = document.querySelector(`.csel-opt[data-c="${c}"]`);
  if(opt) opt.classList.add('on');
  document.getElementById('cselPopup').classList.remove('open');
  updateRankings();
}

function updateRankings() {
  const r = RANKINGS[curDate] && RANKINGS[curDate][curCountry];
  const appleEl  = document.getElementById('rankApple');
  const androidEl = document.getElementById('rankAndroid');
  const aNum = document.getElementById('rApple');
  const gNum = document.getElementById('rAndroid');
  if(r && r.apple) {
    aNum.textContent = '#' + r.apple;
    appleEl.classList.add('live');
  } else {
    aNum.textContent = '--';
    appleEl.classList.remove('live');
  }
  if(r && r.android) {
    gNum.textContent = '#' + r.android;
    androidEl.classList.add('live');
  } else {
    gNum.textContent = '--';
    androidEl.classList.remove('live');
  }
}

const loadedTabs = new Set();

function preloadAndRender(d, k) {
  const key = d + "/" + k;
  const imgs = IMGS[d][k] || [];
  if(!imgs.length || loadedTabs.has(key)) { renderViewer(); return; }
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('show');
  let done = 0;
  imgs.forEach(src => {
    const img = new Image();
    img.onload = img.onerror = () => {
      done++;
      if(done >= imgs.length) {
        loadedTabs.add(key);
        overlay.classList.remove('show');
        renderViewer();
      }
    };
    img.src = src;
  });
}
let curDate = '20260527';
let curTab = '';
let curIdx = 0;
let calYear = 0, calMonth = 0;

function fmtDateBtn(s) {
  return s.slice(0,4)+'/'+s.slice(4,6)+'/'+s.slice(6,8);
}

function toggleCal() {
  const p = document.getElementById('calPopup');
  if(p.classList.contains('open')) {
    p.classList.remove('open');
  } else {
    // Init calendar to current selected date's month
    const d = curDate || AVAIL_DATES[0];
    calYear  = parseInt(d.slice(0,4));
    calMonth = parseInt(d.slice(4,6))-1;
    renderCal();
    p.classList.add('open');
  }
}

function changeMonth(dir) {
  calMonth += dir;
  if(calMonth < 0)  { calMonth = 11; calYear--; }
  if(calMonth > 11) { calMonth = 0;  calYear++; }
  renderCal();
}

function renderCal() {
  const months = ['1月','2月','3月','4月','5月','6月',
                  '7月','8月','9月','10月','11月','12月'];
  document.getElementById('calMonthLabel').textContent =
    calYear + ' 年 ' + months[calMonth];

  const grid = document.getElementById('calGrid');
  const first = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const days  = new Date(calYear, calMonth+1, 0).getDate();
  let html = '';

  // Leading blanks
  for(let i=0; i<first; i++) html += '<div class="cal-cell"></div>';

  for(let d=1; d<=days; d++) {
    const mm = String(calMonth+1).padStart(2,'0');
    const dd = String(d).padStart(2,'0');
    const key = `${calYear}${mm}${dd}`;
    const hasData = AVAIL_DATES.includes(key);
    const isSel   = key === curDate;
    let cls = 'cal-cell';
    if(hasData) cls += ' has-data';
    if(isSel)   cls += ' selected';
    const click = hasData ? `onclick="selectDate('${key}')"` : '';
    html += `<div class="${cls}" ${click}>${d}</div>`;
  }
  grid.innerHTML = html;
}

function selectDate(d) {
  curDate = d;
  document.getElementById('calBtnTxt').textContent = fmtDateBtn(d);
  document.getElementById('calPopup').classList.remove('open');
  // Show this date's panel
  document.querySelectorAll('.dp').forEach(p=>p.classList.remove('on'));
  const panel = document.getElementById('dp-'+d);
  if(panel) panel.classList.add('on');
  // Activate first tab
  const firstTab = Object.keys(IMGS[d])[0];
  switchAct(d, firstTab);
  updateRankings();
}

function switchDate(d) {
  selectDate(d);
}

// Close calendar when clicking outside
document.addEventListener('click', e => {
  const calW = document.getElementById('calWrap');
  if(calW && !calW.contains(e.target))
    document.getElementById('calPopup').classList.remove('open');
  const cselW = document.getElementById('cselWrap');
  if(cselW && !cselW.contains(e.target))
    document.getElementById('cselPopup').classList.remove('open');
});

function switchAct(d, k) {
  document.querySelectorAll('.at').forEach(b=>b.classList.remove('on'));
  const btn = document.getElementById('at-'+d+'-'+k);
  if(btn) btn.classList.add('on');
  curTab = k;
  curIdx = 0;
  preloadAndRender(d, k);
}

function renderViewer() {
  const imgs = IMGS[curDate][curTab] || [];
  const total = imgs.length;
  if(!total) return;

  // Main image
  document.getElementById('mainImg').src = imgs[curIdx];
  document.getElementById('counter').textContent = (curIdx+1) + ' / ' + total;

  // Arrows
  document.getElementById('btnPrev').classList.toggle('hidden', curIdx === 0);
  document.getElementById('btnNext').classList.toggle('hidden', curIdx === total-1);

  // Thumbnails
  const strip = document.getElementById('thumbs');
  strip.innerHTML = imgs.map((src, i) =>
    `<div class="thumb ${i===curIdx?'on':''}" onclick="goTo(${i})">
      <img src="${src}" loading="lazy"/>
    </div>`
  ).join('');

  // Scroll active thumb into view
  setTimeout(()=>{
    const active = strip.querySelector('.thumb.on');
    if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, 50);
}

function navigate(dir) {
  const imgs = IMGS[curDate][curTab] || [];
  curIdx = Math.max(0, Math.min(imgs.length-1, curIdx+dir));
  renderViewer();
}

function goTo(i) {
  curIdx = i;
  renderViewer();
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft') navigate(-1);
  if(e.key==='ArrowRight') navigate(1);
});

curDate = firstDate;
curTab = firstTab;

</script>
